# 侧边栏配置
sidebar:
    # 侧边栏组件配置列表 (侧栏组件预设位于 src/types/config.ts 的 WidgetComponentType)
    components:
        # 左侧侧边栏
        left:
            - # 组件 - 资料 (预设)
                # 类型
                type: "profile"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "top"
                # 页面可见性配置
                visibility:
                    # 匹配模式：'include' (包含), 'exclude' (排除)
                    mode: "exclude"
                    # 页面路径匹配规则列表 (支持正则字符串)
                    paths: ["^/posts/", "^/archive"]
            - # 组件 - 目录 (预设)
                # 类型
                type: "directory"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "sticky"
            - # 组件 - 文章类别 (预设)
                # 类型
                type: "categories"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "sticky"
                # 响应式配置
                responsive:
                    # 折叠阈值
                    collapseThreshold: 5
                # 目录深度
                depth: 3
            - # 组件 - 文章标签 (预设)
                # 类型
                type: "tags"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "sticky"
                # 响应式配置
                responsive:
                    # 折叠阈值
                    collapseThreshold: 20
        # 右侧侧边栏
        right:
            - # 组件 - 公告 (预设)
                # 类型
                type: "announcement"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "top"
                # 页面可见性配置
                visibility:
                    # 匹配模式：'include' (包含), 'exclude' (排除)
                    mode: "include"
                    # 页面路径匹配规则列表 (支持正则字符串)
                    paths: ["^/$"]
            - # 组件 - 文章目录 (预设)
                # 类型
                type: "toc"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "sticky"
                # 目录深度 (1-6，1 表示只显示 h1 标题，2 表示显示 h1 和 h2 标题，依此类推)
                depth: 3
            - # 组件 - 文章统计 (预设)
                # 类型
                type: "statistics"
                # 位置策略 ("top" 顶部固定 | "sticky" 粘性)
                position: "sticky"
                # 页面可见性配置
                visibility:
                    # 匹配模式：'include' (包含), 'exclude' (排除)
                    mode: "include"
                    # 页面路径匹配规则列表 (支持正则字符串)
                    paths: ["^/$", "^/archive$"]

# 资料配置
profile:
    # 头像配置 (相对于 /public 目录)
    avatar: "/assets/images/avatar.webp"
    # 信息配置
    name: "LLGY"
    # 简介配置
    bio: "Hello World"
    # 链接配置
    links:
        - # 链接示例
            # 名字
            name: "GitHub"
            # 图标
            icon: "fa6-brands:github"
            # 链接
            url: "https://github.com/LLGY0/llgy0.github.io"
        - # 链接示例
            # 名字
            name: "BiliBili"
            # 图标
            icon: "fa6-brands:bilibili"
            # 链接
            url: "https://space.bilibili.com/7334180"
        - # 链接示例
            # 名字
            name: "Steam"
            # 图标
            icon: "fa6-brands:steam"
            # 链接
            url: "https://steamcommunity.com/id/15022301141/"

# 公告配置
announcement:
    # 公告标题
    title: "公告栏"
    # 公告内容
    content: "我爱吃屎！！  pnpm dev   pnpm build   pnpm install"
    # 允许用户关闭公告
    closable: false
    # 链接配置
    link:
        # 启用链接
        enable: false
        # 链接文本
        text: "Learn More"
        # 链接 URL
        url: "/about/"
        # 是否外部链接
        external: false

# 文章配置
post:
    # 显示“上次编辑”卡片
    showLastModified: true
    # 代码高亮配置
    expressiveCode:
        # 主题
        theme: "github-dark"
    # 许可证配置
    license:
        # 启用许可证
        enable: false
        # 许可证名称
        name: "CC BY-NC-SA 4.0"
        # 许可证链接
        url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    # 评论配置
    comment:
        # 启用评论功能
        enable: false
        # Twikoo 评论系统配置
        twikoo:
            # 环境 ID
            envId: "https://twikoo.vercel.app"
            # 语言
            lang: "en"

# 页脚配置
footer:
    # 启用 Footer HTML 注入功能
    enable: false
    # 自定义 HTML 内容，用于添加备案号等信息
    customHtml: ""

# 粒子特效配置
particle:
    # 启用粒子特效
    enable: false
    # 粒子数量
    particleNum: 10
    # 粒子越界限制次数，-1为无限循环
    limitTimes: -1
    # 粒子尺寸配置
    size:
        # 粒子最小尺寸倍数
        min: 0.3
        # 粒子最大尺寸倍数
        max: 0.9
    # 粒子透明度配置
    opacity:
        # 粒子最小不透明度
        min: 0.3
        # 粒子最大不透明度
        max: 0.9
    # 粒子移动速度配置
    speed:
        # 水平移动速度
        horizontal:
            # 最小值
            min: -0.9
            # 最大值
            max: 0.9
        # 垂直移动速度
        vertical:
            # 最小值
            min: 0.15
            # 最大值
            max: 0.3
        # 旋转速度
        rotation: 0.12
        # 消失速度
        fadeSpeed: 0.12
    # 粒子层级
    zIndex: 100

