# 媒体目录配置
media:
  - name: public
    label: Public Images
    input: public/assets/images
    output: /assets/images
    categories: [image]
  - name: posts
    label: Posts Images
    input: src/content/posts
    output: /src/content/posts
    categories: [image]
  - name: diary
    label: Diary Images
    input: src/content/diary
    output: /src/content/diary
    categories: [image]
  - name: albums
    label: Albums Images
    input: src/content/albums
    output: /src/content/albums
    categories: [image]
  - name: projects
    label: Projects Images
    input: src/content/projects
    output: /src/content/projects
    categories: [image]


# 内容管理配置
content:

  # 文章
  - type: collection
    # 集合名称
    name: posts
    # 后台显示标签
    label: Posts
    # 内容存储目录
    path: src/content/posts
    # 是否支持子文件夹
    subfolders: true
    # 文件命名规则
    filename: "{slug}.md"
    # 字段列表
    fields:
      - { name: title, label: Title, type: string }
      - { name: published, label: Published Date, type: date }
      - { name: updated, label: Updated Date, type: date, required: false }
      - { name: description, label: Description, type: text, required: false }
      - { name: cover, label: Cover, type: image, options: {media: posts}, required: false }
      - { name: category, label: Category, type: string, list: true, required: false }
      - { name: tags, label: Tags, type: string, list: true, required: false }
      - { name: draft, label: Draft, type: boolean, required: false }
      - { name: body, label: Body, type: rich-text, required: true }

  # 日记
  - type: collection
    # 集合名称
    name: diary
    # 后台显示标签
    label: Diary
    # 内容存储目录
    path: src/content/diary
    # 文件命名规则
    filename: "{year}-{month}-{day}-{hour}-{minute}.json"
    # 字段列表
    fields:
      - { name: title, label: Title, type: string }
      - { name: content, label: Content, type: text }
      - { name: date, label: Date, type: date }
      - { name: images, label: Images, type: image, options: { media: diary, multiple: true }, required: false }

  # 相册
  - type: collection
    # 集合名称
    name: albums
    # 后台显示标签
    label: Albums
    # 内容存储目录
    path: src/content/albums
    # 文件命名规则
    filename: "{slug}.json"
    # 字段列表
    fields:
      - { name: title, label: Title, type: string }
      - { name: description, label: Description, type: text, required: false }
      - { name: cover, label: Cover, type: image }
      - { name: date, label: Date, type: date }
      - { name: location, label: Location, type: string, required: false }
      - { name: tags, label: Tags, type: string, list: true, required: false }
      - { name: layout, label: Layout, type: select, options: {values: [grid, masonry, list]}, default: grid }
      - { name: columns, label: Columns, type: number, default: 3, min: 1, max: 6 }
      - type: object
        name: photos
        label: Photos
        list: true
        required: false
        fields:
          - { name: src, label: Image, type: image, options: {media: albums} }
          - { name: alt, label: Caption, type: string, required: false }
          - { name: title, label: Title, type: string, required: false }
          - { name: description, label: Description, type: text, required: false }
          - { name: tags, label: Tags, type: string, list: true, required: false }
          - { name: date, label: Date, type: date, required: false }
      - { name: visible, label: Visible, type: boolean, required: false }

  # 项目
  - type: collection
    # 集合名称
    name: projects
    # 后台显示标签
    label: Projects
    # 内容存储目录
    path: src/content/projects
    # 文件命名规则
    filename: "{slug}.json"
    # 字段列表
    fields:
      - { name: title, label: Title, type: string }
      - { name: description, label: Description, type: text }
      - { name: image, label: Image, type: image, options: {media: projects}, required: false }
      - { name: category, label: Category, type: select, options: {values: [library, ai, software, website, game]} }
      - { name: techStack, label: Tech Stack, type: string, list: true }
      - { name: status, label: Status, type: select, options: {values: [completed, in-progress, planned]} }
      - { name: liveDemo, label: Live Demo, type: string, required: false }
      - { name: sourceCode, label: Source Code, type: string, required: false }
      - { name: startDate, label: Start Date, type: date }
      - { name: endDate, label: End Date, type: date, required: false }
      - { name: featured, label: Featured, type: boolean, required: false }
      - { name: tags, label: Tags, type: string, list: true, required: false }

  # 技能
  - type: collection
    # 集合名称
    name: skills
    # 后台显示标签
    label: Skills
    # 内容存储目录
    path: src/content/skills
    # 文件命名规则
    filename: "{slug}.json"
    # 字段列表
    fields:
      - { name: name, label: Name, type: string }
      - { name: description, label: Description, type: text }
      - { name: icon, label: Icon, type: string }
      - { name: category, label: Category, type: select, options: {values: [ai, backend, client, frontend, database, engines, tools, others]} }
      - { name: level, label: Level, type: select, options: {values: [beginner, intermediate, advanced, expert]} }
      - type: object
        name: experience
        label: Experience
        fields:
          - { name: years, label: Years, type: number }
          - { name: months, label: Months, type: number }
      - { name: projects, label: Projects, type: string, list: true, required: false }
      - { name: certifications, label: Certifications, type: string, list: true, required: false }
      - { name: color, label: Color, type: string, required: false }

  # 时间线
  - type: collection
    # 集合名称
    name: timeline
    # 后台显示标签
    label: Timeline
    # 内容存储目录
    path: src/content/timeline
    # 文件命名规则
    filename: "{slug}.json"
    # 字段列表
    fields:
      - { name: title, label: Title, type: string }
      - { name: description, label: Description, type: text }
      - { name: type, label: Type, type: select, options: {values: [education, work, project, achievement]} }
      - { name: startDate, label: Start Date, type: date }
      - { name: endDate, label: End Date, type: date, required: false }
      - { name: location, label: Location, type: string, required: false }
      - { name: organization, label: Organization, type: string, required: false }
      - { name: position, label: Position, type: string, required: false }
      - { name: skills, label: Skills, type: string, list: true, required: false }
      - { name: achievements, label: Achievements, type: string, list: true, required: false }
      - type: object
        name: links
        label: Links
        list: true
        required: false
        fields:
          - { name: name, label: Name, type: string }
          - { name: url, label: URL, type: string }
          - { name: type, label: Type, type: select, options: {values: [certificate, project, other]} }
      - { name: icon, label: Icon, type: string, required: false }
      - { name: color, label: Color, type: string, required: false }

  # 友链
  - type: collection
    # 集合名称
    name: friends
    # 后台显示标签
    label: Friends
    # 内容存储目录
    path: src/content/friends
    # 文件命名规则
    filename: "{slug}.json"
    # 字段列表
    fields:
      - { name: title, label: Title, type: string }
      - { name: imgurl, label: Avatar URL, type: string }
      - { name: desc, label: Description, type: text }
      - { name: siteurl, label: Site URL, type: string }
      - { name: tags, label: Tags, type: string, list: true, required: false }